<aside id="site-sidebar" class="sidebar" aria-label="Documentation navigation">
  <div class="sidebar__inner">
    <nav class="sidebar__nav">
      {{#if menus.primary.items}}
        {{#for group in menus.primary.items}}
          {{#if group.children}}
            <details class="sidebar__group{{#if group.meta.accent}} sidebar__group--{{group.meta.accent}}{{/if}}" {{#if group.meta.group_id}}data-group="{{group.meta.group_id}}"{{/if}} open>
              <summary class="sidebar__title">
                <span class="sidebar__accent"></span>
                <span class="sidebar__title-label">{{group.title}}</span>
                <svg class="sidebar__chevron" width="12" height="12" aria-hidden="true"><use href="#icon-chevron-right"/></svg>
              </summary>
              <ul>
                {{#for item in group.children}}
                  <li>
                    <a
                      class="sidebar__link"
                      href="{{item.url}}"
                      {{#if item.target}}target="{{item.target}}"{{/if}}
                      {{#if_eq item.target "_blank"}}rel="noopener noreferrer"{{/if}}
                      {{#if_eq item.url "/"}}
                        {{#if_eq route.url item.url}}aria-current="page"{{/if}}
                      {{#else_if_starts_with route.url item.url}}
                        aria-current="page"
                      {{/if}}
                    >
                      {{item.title}}
                    </a>
                  </li>
                {{/for}}
              </ul>
            </details>
          {{#else}}
            <a
              class="sidebar__link sidebar__link--top"
              href="{{group.url}}"
              {{#if group.target}}target="{{group.target}}"{{/if}}
              {{#if_eq group.target "_blank"}}rel="noopener noreferrer"{{/if}}
              {{#if_eq group.url "/"}}
                {{#if_eq route.url group.url}}aria-current="page"{{/if}}
              {{#else_if_starts_with route.url group.url}}
                aria-current="page"
              {{/if}}
            >
              {{group.title}}
            </a>
          {{/if}}
        {{/for}}
      {{/if}}
    </nav>
  </div>
</aside>
